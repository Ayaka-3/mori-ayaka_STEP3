<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界一甘いお店</title>
    <link rel="stylesheet" href="test.css">
</head>
<body>
    <header>
        <h2>世界一甘いお店</h2>
    </header>
    <div class="container">
      <nav>
          <ul>
              <li><a href="section1">トップ</a></li>
              <li><a href="section2">新着情報</a></li>
              <li><a href="section3">おすすめのスイーツ</a></li>
              <li><a href="section4">お問い合わせ</a></li>
          </ul>
      </nav>
      
      <section id="section2">
        <table border="4">
            <tr>
                <th>お名前</th>
                <td><input type="text" size="40"></td>
            </tr>
            <tr>
                <th>お近くのお店</th>
                <td>
                    <select>
                      <option>北海道・東北</option>
                      <option>関東</option>
                      <option>中部</option>
                      <option>関西</option>
                      <option>中国・四国</option>
                      <option>九州・沖縄</option>
                    </select>
                </td>
            </tr>
            <tr>
                <th>電話</th>
                <td><input type="tel" size="40"></td>
            </tr>
            <tr>
                <th>電話番号</th>
                <td><input type="tel" size="40"></td>
            </tr>
            <tr>
              <th>メールアドレス</th>
              <td><input type="email" size="40"></td>
            </tr>
            <tr>
              <th>お問い合わせ種別</th>
              <td>
                  <input type="radio" name="type">商品について
                  <input type="radio" name="type">従業員について
              </td>
            </tr>
            <tr>
              <th>お問い合わせ内容</th>
              <td>
                  <textarea cols="30" rows="5" placeholder="詳細を入力してください"></textarea>
              </td>
            </tr>
        </table>
        <div style="text-align: right; margin-top: 10px;">
            <input type="submit" value="送信">
        </div>
      </section>  
    </div>  
    <footer></footer>
</body>
</html>
